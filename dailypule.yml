name: Pulse Bot — Daily Snapshot

on:
  # Run every day at 07:00 UTC
  schedule:
    - cron: "0 7 * * *"

  # Also allow a manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      city:
        description: "City to fetch weather for"
        required: false
        default: "London"

jobs:
  pulse:
    name: Fetch & Save Daily Pulse
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push summary.txt back to the repo

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dev dependencies (pytest etc.)
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the tests
      - name: Run tests
        run: pytest tests/ -v

      # 5. Run Pulse Bot
      #    City priority: manual input → PULSE_CITY secret → default (London)
      - name: Run Pulse Bot
        env:
          PULSE_CITY: ${{ github.event.inputs.city || vars.PULSE_CITY || 'London' }}
        run: python pulse_bot.py "$PULSE_CITY"

      # 6. Commit summary.txt back to the repo (only if it changed)
      - name: Commit summary.txt
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add summary.txt
          # --allow-empty=false exits 0 with "nothing to commit" — guard it
          if git diff --cached --quiet; then
            echo "No changes to summary.txt — skipping commit."
          else
            git commit -m "chore: daily pulse snapshot [skip ci]"
            git push
          fi
