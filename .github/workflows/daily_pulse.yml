name: Pulse Bot — Daily Snapshot

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      city:
        description: "City to fetch weather for"
        required: false
        default: "London"

jobs:
  pulse:
    name: Fetch & Save Daily Pulse
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run Pulse Bot
        env:
          PULSE_CITY: ${{ github.event.inputs.city || vars.PULSE_CITY || 'London' }}
        run: python pulse_bot.py "$PULSE_CITY"

      - name: Commit summary.txt
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add summary.txt
          if git diff --cached --quiet; then
            echo "No changes to summary.txt — skipping commit."
          else
            git commit -m "chore: daily pulse snapshot [skip ci]"
            git push
          fi
